<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교당별 법회출석 추이 · 원기97~110년</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>

<style>
  :root{
    --bg: #161b22;
    --surface: #1e2530;
    --surface-2: #252d3a;
    --gold: #c9a24b;
    --gold-soft: #8a713a;
    --teal: #4f8a8b;
    --cream: #ece6d6;
    --muted: #8b93a3;
    --line: #333c4a;
    --danger: #c1615a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(1200px 600px at 85% -10%, #202839 0%, var(--bg) 55%);
    color: var(--cream);
    font-family:'Noto Sans KR', sans-serif;
    font-weight:300;
    min-height:100vh;
    padding: 40px 6vw 80px;
  }
  a{color:var(--gold);}

  /* ---------- Header ---------- */
  header{
    display:flex;
    align-items:center;
    gap:28px;
    margin-bottom:36px;
    position:relative;
  }
  .ilwon{
    width:74px;height:74px;flex:0 0 auto;position:relative;
  }
  .ilwon svg{width:100%;height:100%;}
  .htext h1{
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    font-size:clamp(24px,3vw,34px);
    margin:0 0 6px;
    letter-spacing:-0.01em;
    color:#f5efe1;
  }
  .htext p{
    margin:0;
    color:var(--muted);
    font-size:14px;
    letter-spacing:0.02em;
  }
  .htext .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--gold);
    letter-spacing:0.18em;
    text-transform:uppercase;
    margin-bottom:8px;
  }

  /* ---------- Summary cards ---------- */
  .summary{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
    margin-bottom:32px;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px 20px;
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute; top:0; left:0; width:3px; height:100%;
    background:var(--gold);
    opacity:0.7;
  }
  .card .label{
    font-size:11px; color:var(--muted); letter-spacing:0.08em;
    text-transform:uppercase; margin-bottom:10px;
  }
  .card .value{
    font-family:'JetBrains Mono', monospace;
    font-size:24px; font-weight:500; color:#f5efe1;
  }
  .card .sub{ font-size:12px; color:var(--muted); margin-top:6px; }
  .card .sub.up{ color:#8fbf8a; }
  .card .sub.down{ color:var(--danger); }

  /* ---------- Main layout ---------- */
  .layout{
    display:grid;
    grid-template-columns: 300px 1fr;
    gap:20px;
    align-items:start;
  }
  .panel{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
  }
  .panel h2{
    font-family:'Noto Serif KR', serif;
    font-size:15px; font-weight:600; margin:0 0 14px;
    color:#f5efe1; display:flex; align-items:center; gap:8px;
  }
  .panel h2 .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);display:inline-block;}

  /* selector panel */
  #search{
    width:100%; padding:9px 12px; border-radius:8px;
    border:1px solid var(--line); background:var(--surface-2);
    color:var(--cream); font-family:'Noto Sans KR',sans-serif; font-size:13px;
    margin-bottom:12px; outline:none;
  }
  #search:focus{border-color:var(--gold);}
  .quickbtns{display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap;}
  .qbtn{
    font-size:11px; padding:5px 10px; border-radius:20px;
    border:1px solid var(--line); background:var(--surface-2);
    color:var(--muted); cursor:pointer; transition:all .15s;
  }
  .qbtn:hover{border-color:var(--gold); color:var(--gold);}
  .qbtn.active{background:var(--gold); color:#1a1e17; border-color:var(--gold); font-weight:500;}

  #church-list{
    max-height:520px; overflow-y:auto; padding-right:4px;
  }
  #church-list::-webkit-scrollbar{width:6px;}
  #church-list::-webkit-scrollbar-thumb{background:var(--line); border-radius:3px;}
  .church-row{
    display:flex; align-items:center; gap:9px;
    padding:6px 4px; border-radius:6px; cursor:pointer;
    font-size:13px;
  }
  .church-row:hover{background:var(--surface-2);}
  .church-row input{accent-color:var(--gold); width:14px; height:14px; cursor:pointer;}
  .swatch{width:10px;height:10px;border-radius:2px;flex:0 0 auto;}
  .church-row .cname{flex:1;}
  .church-row .cval{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted);}

  /* chart panel */
  .chart-wrap{min-height:460px;}
  #chartCanvas{width:100%!important; height:460px!important;}
  .chart-foot{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:10px; font-size:11px; color:var(--muted);
  }

  /* ranking table */
  .ranking{margin-top:20px;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{
    text-align:left; font-weight:500; color:var(--muted);
    font-size:11px; text-transform:uppercase; letter-spacing:0.05em;
    padding:8px 10px; border-bottom:1px solid var(--line);
  }
  td{padding:8px 10px; border-bottom:1px solid rgba(255,255,255,0.04);}
  tr.rank-row{cursor:pointer; transition:background .1s;}
  tr.rank-row:hover{background:var(--surface-2);}
  .bar-cell{width:160px;}
  .bar-track{height:8px; background:var(--surface-2); border-radius:4px; overflow:hidden;}
  .bar-fill{height:100%; background:linear-gradient(90deg, var(--gold-soft), var(--gold));}
  .num{font-family:'JetBrains Mono',monospace; text-align:right;}
  .delta.up{color:#8fbf8a;}
  .delta.down{color:var(--danger);}

  footer{
    margin-top:40px; text-align:center; color:var(--muted); font-size:11px;
    font-family:'JetBrains Mono',monospace; letter-spacing:0.04em;
  }

  @media (max-width:920px){
    .summary{grid-template-columns:repeat(2,1fr);}
    .layout{grid-template-columns:1fr;}
  }
</style>
</head>

</div>

const names = Object.keys(RAW);
const N = names.length;

// color palette (deterministic, warm/gold + teal spectrum family)
function colorFor(i){
  const hues = [42, 174, 8, 200, 100, 320, 260, 60];
  const h = hues[i % hues.length];
  const s = 55 + (i*7 % 25);
  const l = 48 + (i*11 % 18);
  return `hsl(${h} ${s}% ${l}%)`;
}
const colorMap = {};
names.forEach((n,i)=> colorMap[n] = colorFor(i));

// ---- derived stats ----
const last = 13, first = 0;
const totalByYear = YEARS.map((_,yi)=> names.reduce((s,n)=> s+RAW[n][yi],0));
const total97 = totalByYear[first], total110 = totalByYear[last];
const totalChangePct = ((total110-total97)/total97*100);

let maxGrowthName = names[0], maxGrowthVal = -Infinity;
let maxDeclineName = names[0], maxDeclineVal = Infinity;
names.forEach(n=>{
  const d = RAW[n][last]-RAW[n][first];
  if(d>maxGrowthVal){maxGrowthVal=d; maxGrowthName=n;}
  if(d<maxDeclineVal){maxDeclineVal=d; maxDeclineName=n;}
});

const fmt = v => v.toLocaleString('ko-KR');

// ---- summary cards ----
const summaryData = [
  {label:'대상 교당 수', value:`${N}개처`, sub:`원기97년~110년 · 14개년 데이터`, cls:''},

  {label:'최대 감소 교당', value:maxDeclineName, sub:`${fmt(maxDeclineVal)}명 (97→110)`, cls:'down'},
];
document.getElementById('summaryCards').innerHTML = summaryData.map(c=>`
  <div class="card">
    <div class="label">${c.label}</div>
    <div class="value">${c.value}</div>
    <div class="sub ${c.cls}">${c.sub}</div>
  </div>`).join('');

// ---- selection state ----
const top8 = [...names].sort((a,b)=>RAW[b][last]-RAW[a][last]).slice(0,8);
let selected = new Set(top8);

// ---- church list render ----
const listEl = document.getElementById('church-list');
function renderList(filter=''){
  const f = filter.trim();
  listEl.innerHTML = [...names]
    .filter(n=>n.includes(f))
    .sort((a,b)=>RAW[b][last]-RAW[a][last])
    .map(n=>`
      <label class="church-row">
        <input type="checkbox" data-name="${n}" ${selected.has(n)?'checked':''}>
        <span class="swatch" style="background:${colorMap[n]}"></span>
        <span class="cname">${n}</span>
        <span class="cval">${fmt(RAW[n][last])}</span>
      </label>`).join('');
  listEl.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change', e=>{
      const n = e.target.dataset.name;
      if(e.target.checked) selected.add(n); else selected.delete(n);
      updateChart();
    });
  });
}
renderList();

document.getElementById('search').addEventListener('input', e=> renderList(e.target.value));

// ---- preset buttons ----
document.querySelectorAll('.qbtn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const p = btn.dataset.preset;
    if(p==='top8') selected = new Set(top8);
    else if(p==='all') selected = new Set(names);
    else if(p==='none') selected = new Set();
    else if(p==='growth'){
      selected = new Set([...names].sort((a,b)=>(RAW[b][last]-RAW[b][first])-(RAW[a][last]-RAW[a][first])).slice(0,8));
    } else if(p==='decline'){
      selected = new Set([...names].sort((a,b)=>(RAW[a][last]-RAW[a][first])-(RAW[b][last]-RAW[b][first])).slice(0,8));
    }
    renderList(document.getElementById('search').value);
    updateChart();
  });
});

// ---- chart ----
const ctx = document.getElementById('chartCanvas').getContext('2d');
let chart = new Chart(ctx, {
  type:'line',
  data:{ labels: YEARS, datasets: [] },
  options:{
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'nearest', intersect:false},
    plugins:{
      legend:{
        position:'bottom',
        labels:{ color:'#ece6d6', font:{family:"'Noto Sans KR'", size:11}, boxWidth:10, boxHeight:10, padding:12 }
      },
      tooltip:{
        backgroundColor:'#1e2530', borderColor:'#333c4a', borderWidth:1,
        titleColor:'#f5efe1', bodyColor:'#ece6d6',
        callbacks:{ label: c => ` ${c.dataset.label}: ${c.parsed.y.toLocaleString('ko-KR')}명` }
      }
    },
    scales:{
      x:{ ticks:{color:'#8b93a3', font:{size:11}}, grid:{color:'rgba(255,255,255,0.04)'} },
      y:{ ticks:{color:'#8b93a3', font:{size:11}, callback:v=>v.toLocaleString('ko-KR')}, grid:{color:'rgba(255,255,255,0.06)'} }
    }
  }
});

function updateChart(){
  const list = [...selected];
  chart.data.datasets = list.map(n=>({
    label:n,
    data: RAW[n],
    borderColor: colorMap[n],
    backgroundColor: colorMap[n],
    borderWidth:2,
    pointRadius:2.5,
    pointHoverRadius:5,
    tension:0.25,
    fill:false
  }));
  chart.update();
  document.getElementById('selCount').textContent = `${list.length}개 교당 표시 중`;
}
updateChart();

// ---- ranking table ----
const rankBody = document.getElementById('rankBody');
const ranked = [...names].sort((a,b)=>RAW[b][last]-RAW[a][last]);
const maxVal = Math.max(...names.map(n=>RAW[n][last]));
rankBody.innerHTML = ranked.map((n,i)=>{
  const v97 = RAW[n][first], v110 = RAW[n][last];
  const delta = v110-v97;
  const pct = (delta/v97*100);
  return `
    <tr class="rank-row" data-name="${n}">
      <td class="num">${i+1}</td>
      <td>${n}</td>
      <td class="num">${fmt(v97)}</td>
      <td class="num">${fmt(v110)}</td>
      <td class="num delta ${delta>=0?'up':'down'}">${delta>=0?'+':''}${fmt(delta)} (${pct>=0?'+':''}${pct.toFixed(0)}%)</td>
      <td class="bar-cell"><div class="bar-track"><div class="bar-fill" style="width:${(v110/maxVal*100).toFixed(1)}%"></div></div></td>
    </tr>`;
}).join('');

rankBody.querySelectorAll('tr').forEach(tr=>{
  tr.addEventListener('click', ()=>{
    const n = tr.dataset.name;
    if(selected.has(n)) selected.delete(n); else selected.add(n);
    renderList(document.getElementById('search').value);
    updateChart();
  });
});
</script>
</body>
</html>
