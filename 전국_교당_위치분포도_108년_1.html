/* 필터 칩 */
const districts = ['전체', ...Object.keys(DC)];
const chipsEl = document.getElementById('chips');
let activeDistrict = '전체';

districts.forEach(d => {
  const btn = document.createElement('button');
  btn.className = 'chip' + (d === '전체' ? ' on' : '');
  btn.textContent = d;
  if (d === '전체') { btn.style.cssText = 'background:#1b3f7b;color:#fff;border-color:#1b3f7b;'; }
  btn.onclick = () => {
    activeDistrict = d;
    document.querySelectorAll('.chip').forEach(b => {
      const name = b.textContent;
      if (name === d) {
        b.classList.add('on');
        b.style.background = name === '전체' ? '#1b3f7b' : (DC[name] || '#888');
        b.style.color = '#fff';
        b.style.borderColor = 'transparent';
      } else {
        b.classList.remove('on');
        b.style.background = '';
        b.style.color = '';
        b.style.borderColor = '';
      }
    });
    applyFilter();
  };
  chipsEl.appendChild(btn);
});

const map = L.map('map', { zoomControl:true }).setView([36.5, 127.8], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
  maxZoom:19
}).addTo(map);

function markerSize(members) {
  if (members > 1000) return 18;
  if (members > 500)  return 14;
  if (members > 200)  return 11;
  if (members > 50)   return 8;
  return 6;
}

function makeIcon(t, hl) {
  const c = DC[t.district] || '#888';
  const r = markerSize(t.members);
  const bw = hl ? '3px' : '1.5px';
  const bc = hl ? '#fff' : 'rgba(255,255,255,.8)';
  const sh = hl
    ? `0 0 0 3px ${c},0 3px 10px rgba(0,0,0,.4)`
    : '0 1px 4px rgba(0,0,0,.3)';
  return L.divIcon({
    className:'',
    html:`<div style="width:${r*2}px;height:${r*2}px;background:${c};border:${bw} solid ${bc};border-radius:50%;box-shadow:${sh};"></div>`,
    iconSize:[r*2,r*2], iconAnchor:[r,r], popupAnchor:[0,-r-4]
  });
}

let markers = {}, selName = null;

ALL_DATA.forEach(t => {
  const mk = L.marker([t.lat, t.lng], { icon: makeIcon(t, false) });
  const c  = DC[t.district] || '#888';
  mk.bindPopup(`
    <div>
      <div class="pu-name">${t.name}</div>
      ${t.district ? `<div class="pu-row"><span class="pu-lbl">교구</span><span class="pu-val" style="color:${c}">${t.district}</span></div>` : ''}
      ${t.subdistrict ? `<div class="pu-row"><span class="pu-lbl">지구</span><span class="pu-val">${t.subdistrict}</span></div>` : ''}
      <div class="pu-row"><span class="pu-lbl">급지</span><span class="pu-val">${t.grade || '—'}</span></div>
      <div class="pu-row"><span class="pu-lbl">관리교도</span><span class="pu-val">${t.members.toLocaleString()}명</span></div>
      <div class="pu-row"><span class="pu-lbl">법회출석</span><span class="pu-val">${t.attendance.toLocaleString()}</span></div>
      <div class="pu-addr">${t.address}</div>
    </div>`, { maxWidth:280 });
  mk.on('click', () => selectTemple(t.name, false));
  mk.addTo(map);
  markers[t.name] = mk;
});

function selectTemple(name, pan) {
  if (selName && markers[selName]) {
    const p = ALL_DATA.find(t => t.name === selName);
    if (p) markers[selName].setIcon(makeIcon(p, false));
  }
  selName = name;
  const t = ALL_DATA.find(d => d.name === name);
  if (!t) return;
  markers[name].setIcon(makeIcon(t, true));
  if (pan !== false) {
    map.setView([t.lat, t.lng], 14, { animate:true });
    markers[name].openPopup();
  }
  renderList();
  setTimeout(() => {
    const el = document.querySelector('.card.sel');
    if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 60);
}

function applyFilter() {
  const q = document.getElementById('search').value;
  const filtered = ALL_DATA.filter(t =>
    (activeDistrict === '전체' || t.district === activeDistrict) && t.name.includes(q)
  );
  ALL_DATA.forEach(t => {
    const mk = markers[t.name];
    if (!mk) return;
    const show = filtered.includes(t);
    if (show) { if (!map.hasLayer(mk)) mk.addTo(map); }
    else      { if ( map.hasLayer(mk)) map.removeLayer(mk); }
  });
  // Update KPI for filtered
  document.getElementById('kpi-count').textContent   = filtered.length;
  document.getElementById('kpi-members').textContent = filtered.reduce((s,t)=>s+t.members,0).toLocaleString();
  document.getElementById('kpi-attend').textContent  = filtered.reduce((s,t)=>s+t.attendance,0).toLocaleString();
  renderList(filtered);
}

function renderList(filtered) {
  if (!filtered) {
    const q = document.getElementById('search').value;
    filtered = ALL_DATA.filter(t =>
      (activeDistrict === '전체' || t.district === activeDistrict) && t.name.includes(q)
    );
  }
  document.getElementById('cnt').textContent = filtered.length;
  document.getElementById('list').innerHTML = filtered.map(t => {
    const c   = DC[t.district] || '#888';
    const sel = t.name === selName;
    return `<div class="card${sel?' sel':''}" onclick="selectTemple('${t.name}')">
      <div class="card-top">
        <span class="card-name">${t.name}</span>
        ${t.district ? `<span class="badge" style="background:${c}">${t.district}</span>` : ''}
      </div>
      <div class="card-bot">
        ${t.grade ? `<span class="tag">${t.grade}</span>` : ''}
        ${t.subdistrict ? `<span class="tag">${t.subdistrict}</span>` : ''}
        <span class="stat">교도 ${t.members.toLocaleString()}명</span>
        <span class="stat">출석 ${t.attendance.toLocaleString()}</span>
      </div>
    </div>`;
  }).join('');
}

/* 레전드 */
const legend = L.control({ position:'bottomright' });
legend.onAdd = () => {
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = '<h4>교구별 색상</h4>' +
    Object.entries(DC).map(([k,v]) =>
      `<div class="li"><div class="ld" style="background:${v}"></div><span>${k}</span></div>`
    ).join('') +
    '<hr><div class="note">● 원 크기 = 관리교도 수</div>';
  return div;
};
legend.addTo(map);

renderList();
</script>
</body>
</html>
